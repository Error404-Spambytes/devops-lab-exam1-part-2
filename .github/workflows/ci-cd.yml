name: ARA CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ara-app .

      - name: Remove old container
        run: docker rm -f ara-container || true

      - name: Run Docker Container
        run: docker run -d -p 8080:80 --name ara-container ara-app